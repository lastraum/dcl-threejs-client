name: Task claim
description: Announce work on a parity gap (no maintainer-assigned backlog)
title: "[task] "
labels: ["task"]
body:
  - type: markdown
    attributes:
      value: |
        **Find gaps:** dev panel (`</>`) → **Full status** tab — pick an integration ref like `ecs:Raycast`.

        **Track work:** **Community** tab — workflow table (in progress · pending review · merged).

        **What's shipped:** **Shipped** tab (`PROGRESS.md`) + **Full status** tab (complete parity matrix).

        **Claim flow:**
        1. Pick an integration ref from the Community tab (or propose a new gap).
        2. File this issue — check for duplicate claims in [in-progress issues](https://github.com/lastraum/dcl-threejs-client/issues?q=is%3Aopen+label%3Ain-progress).
        3. A maintainer (or you, if triager) adds the **`in-progress`** label — bot syncs to `docs/CLAIMS.yaml` + dev panel.
        4. Open a PR when ready; link this issue. On merge, close issue + update `registry.ts` / `integrationRegistry.ts` status.

        Read [docs/AGENTS.md](https://github.com/lastraum/dcl-threejs-client/blob/main/docs/AGENTS.md) before coding.

  - type: input
    id: integration-ref
    attributes:
      label: Integration ref
      description: From dev panel Community tab (e.g. ecs:Raycast, ui:voice-ui, net:voice-tracks)
      placeholder: ecs:TriggerArea
    validations:
      required: true

  - type: dropdown
    id: intent
    attributes:
      label: Intent
      options:
        - Claim (I will open a PR)
        - Propose new gap
        - Question / blocked
    validations:
      required: true

  - type: input
    id: github-handle
    attributes:
      label: GitHub handle
      placeholder: your-handle
    validations:
      required: true

  - type: textarea
    id: plan
    attributes:
      label: Plan
      description: Brief approach, test scenes / your .dcl.eth world, estimated complexity
    validations:
      required: true

  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries acknowledged
      options:
        - label: I read docs/AGENTS.md frozen boundaries (shim, CRDT, no pub/sub, comms rule)
          required: true
        - label: I checked in-progress issues — no duplicate claim on this ref
          required: true