<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>DCL Three.js Client</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
      }
      /* Client chrome layout tokens — --client-sidebar-w updated by ClientUiLayout.ts */
      :root {
        --client-sidebar-w: 44px;
        --client-ui-gap: 8px;
        --client-safe-left: calc(var(--client-sidebar-w) + var(--client-ui-gap));
        --client-safe-right: max(16px, env(safe-area-inset-right, 0px));
        --client-safe-top: max(12px, env(safe-area-inset-top, 0px));
        --client-safe-bottom: max(16px, env(safe-area-inset-bottom, 0px));
        --client-panel-max-w: min(420px, calc(100vw - var(--client-safe-left) - var(--client-safe-right)));
        --client-hud-max-w: min(324px, calc(100vw - var(--client-safe-left) - var(--client-safe-right) - 16px));
        --client-chat-max-h: min(580px, calc(100vh - var(--client-safe-top) - var(--client-safe-bottom) - 96px));
        --client-ui-font-sm: clamp(11px, 0.7rem + 0.15vw, 12px);
        --client-ui-font-md: clamp(13px, 0.8rem + 0.2vw, 15px);
      }
      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #0a1624;
        font-family: system-ui, sans-serif;
      }
      #hud {
        display: none;
      }
      #render-stats {
        position: static !important;
        transform: none !important;
        opacity: 1;
        pointer-events: none;
      }
      #render-stats > div {
        position: relative !important;
        inset: auto !important;
      }
      .debug-panel {
        position: fixed;
        top: var(--client-safe-top);
        right: var(--client-safe-right);
        z-index: 120;
        width: min(420px, calc(100vw - var(--client-safe-right) - 16px));
        max-height: calc(100vh - var(--client-safe-top) - var(--client-safe-bottom));
        display: none;
        flex-direction: column;
        padding: 12px 14px 10px;
        border-radius: 12px;
        background: rgba(12, 12, 18, 0.94);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        pointer-events: auto;
      }
      .debug-panel.is-open {
        display: flex;
      }
      .debug-panel__header {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        margin-bottom: 8px;
        color: rgba(255, 255, 255, 0.75);
      }
      .debug-panel__body.error {
        color: #ff8a80;
      }
      .debug-panel__body code {
        font-size: 11px;
        opacity: 0.9;
      }
      .debug-panel__physx {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .debug-panel__physx-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 2px;
      }
      .debug-panel__check {
        display: flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        color: rgba(255, 255, 255, 0.88);
        user-select: none;
      }
      .debug-panel__check input {
        margin: 0;
        accent-color: #86efac;
      }
      .debug-panel__render-quality {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }
      .debug-panel__render-quality-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 6px;
      }
      .debug-panel__render-quality-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: rgba(255, 255, 255, 0.88);
      }
      .debug-panel__render-quality-row select {
        min-width: 96px;
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        font-size: 12px;
      }
      .debug-panel__render-quality-hint {
        margin-top: 6px;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.5);
      }
      .debug-panel__stats {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }
      .debug-panel__position {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        line-height: 1.45;
        flex-shrink: 0;
      }
      .debug-panel__position-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
        margin-bottom: 4px;
      }
      .debug-panel__position-local,
      .debug-panel__position-world {
        color: rgba(255, 255, 255, 0.88);
      }
      .debug-panel__logs {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        display: flex;
        flex-direction: column;
        min-height: 0;
        flex: 1 1 auto;
      }
      .debug-panel__logs-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
        flex-shrink: 0;
      }
      .debug-panel__logs-title {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      .debug-panel__logs-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .debug-panel__logs-btn {
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.75);
        border-radius: 6px;
        padding: 2px 8px;
        font-size: 10px;
        cursor: pointer;
      }
      .debug-panel__logs-btn:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .debug-panel__logs-body {
        overflow: auto;
        max-height: min(280px, 40vh);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 10px;
        line-height: 1.35;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.28);
        padding: 6px 8px;
      }
      .debug-panel__logs-empty {
        color: rgba(255, 255, 255, 0.4);
        padding: 8px 4px;
      }
      .debug-panel__log-line {
        display: grid;
        grid-template-columns: 54px 52px 1fr;
        gap: 6px;
        padding: 2px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      }
      .debug-panel__log-line:last-child {
        border-bottom: none;
      }
      .debug-panel__log-time {
        color: rgba(255, 255, 255, 0.35);
      }
      .debug-panel__log-cat {
        color: rgba(134, 239, 172, 0.85);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .debug-panel__log-msg {
        color: rgba(255, 255, 255, 0.88);
        word-break: break-word;
      }
      .debug-panel__log-line--warn .debug-panel__log-cat {
        color: rgba(251, 191, 36, 0.9);
      }
      .debug-panel__log-line--error .debug-panel__log-cat,
      .debug-panel__log-line--error .debug-panel__log-msg {
        color: rgba(255, 138, 128, 0.95);
      }
      .debug-panel__log-line--success .debug-panel__log-cat {
        color: rgba(134, 239, 172, 1);
      }
      .minimap {
        position: fixed;
        top: var(--client-safe-top);
        left: var(--client-safe-left);
        z-index: 15;
        width: min(224px, calc(100vw - var(--client-safe-left) - var(--client-safe-right)));
        height: min(224px, calc(100vw - var(--client-safe-left) - var(--client-safe-right)));
        max-width: 224px;
        max-height: 224px;
        border-radius: 50%;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.45);
        pointer-events: none;
        user-select: none;
      }
      .minimap.is-clickable {
        pointer-events: auto;
        cursor: pointer;
      }
      .minimap.is-clickable:focus-visible {
        outline: 2px solid rgba(87, 227, 137, 0.9);
        outline-offset: 3px;
      }
      .minimap canvas {
        display: block;
        border-radius: 50%;
      }
      .world-location-card {
        position: fixed;
        top: var(--client-safe-top);
        left: var(--client-safe-left);
        z-index: 15;
        width: var(--client-hud-max-w);
        max-width: calc(100vw - var(--client-safe-left) - var(--client-safe-right));
        border-radius: 14px;
        background: rgba(12, 12, 14, 0.82);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        color: #fff;
        user-select: none;
        overflow: hidden;
      }
      .world-location-card__header {
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: start;
        gap: 8px;
        padding: 10px 12px 8px;
      }
      .world-location-card__expand {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        margin-top: 2px;
        padding: 0;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.72);
        cursor: pointer;
      }
      .world-location-card__expand:hover {
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
      }
      .world-location-card__expand svg {
        width: 18px;
        height: 18px;
      }
      .world-location-card.is-collapsed .world-location-card__expand svg {
        transform: rotate(180deg);
      }
      .world-location-card__info {
        min-width: 0;
      }
      .world-location-card__title {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.25;
        letter-spacing: 0.01em;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .world-location-card__coords {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 4px 0 0;
        font-size: 13px;
        line-height: 1.2;
        color: rgba(255, 255, 255, 0.88);
      }
      .world-location-card__pin svg,
      .world-location-card__info-icon svg {
        display: block;
        width: 14px;
        height: 14px;
      }
      .world-location-card__info-icon {
        color: rgba(255, 255, 255, 0.55);
      }
      .world-location-card__actions {
        display: flex;
        align-items: center;
        gap: 2px;
      }
      .world-location-card__icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        padding: 0;
        border: 0;
        border-radius: 8px;
        background: transparent;
        color: rgba(255, 255, 255, 0.72);
        opacity: 0.55;
        cursor: default;
      }
      .world-location-card__icon-btn svg {
        width: 18px;
        height: 18px;
      }
      .world-location-card__body {
        display: block;
      }
      .world-location-card.is-collapsed .world-location-card__body {
        display: none;
      }
      .world-location-card__divider {
        height: 1px;
        margin: 0 12px;
        background: rgba(255, 255, 255, 0.1);
      }
      .world-location-card__jump {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        padding: 12px 14px;
        border: 0;
        background: transparent;
        color: #fff;
        cursor: pointer;
        text-align: left;
      }
      .world-location-card__jump:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .world-location-card__jump:focus-visible {
        outline: 2px solid rgba(87, 227, 137, 0.9);
        outline-offset: -2px;
      }
      .world-location-card__jump-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        flex-shrink: 0;
      }
      .world-location-card__jump-icon svg {
        width: 18px;
        height: 18px;
      }
      .world-location-card__jump-text {
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.06em;
        line-height: 1.2;
      }
      .avatar-name-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        transform: translate(-50%, -100%);
        padding: 4px 12px;
        border-radius: 999px;
        background: rgba(0, 0, 0, 0.72);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        white-space: nowrap;
        pointer-events: none;
        user-select: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      }
      .avatar-name-tag__text {
        letter-spacing: 0.01em;
      }
      .avatar-name-tag__badge {
        color: #ff6ad5;
        font-size: 11px;
        line-height: 1;
      }

      /* Client chrome — left sidebar (Explorer-style, separate from scene UI) */
      .client-shell {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 20;
        display: flex;
        flex-direction: column;
        width: clamp(36px, 2vw, 48px);
        height: 100%;
        padding: max(10px, env(safe-area-inset-top, 0px)) 0 max(16px, env(safe-area-inset-bottom, 0px));
        background: rgba(12, 12, 16, 0.92);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        pointer-events: auto;
      }
      .client-shell__top,
      .client-shell__bottom {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        width: 100%;
      }
      .client-shell__top {
        flex: 0 0 auto;
        padding-top: 4px;
      }
      .client-shell__bottom {
        margin-top: auto;
        padding-bottom: 2px;
      }
      .client-sidebar__divider {
        width: 24px;
        height: 1px;
        margin: 4px 0;
        background: rgba(255, 255, 255, 0.12);
      }
      .client-sidebar__btn--profile {
        width: 30px;
        height: 30px;
        padding: 0;
        border-radius: 50%;
        box-shadow: 0 0 0 2px #57e389;
      }
      .client-sidebar__avatar {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        image-rendering: pixelated;
        background: #2a2a34;
      }
      .client-sidebar__btn {
        position: relative;
        display: grid;
        place-items: center;
        width: 32px;
        height: 32px;
        border: 0;
        border-radius: 10px;
        background: transparent;
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        transition: background 0.15s ease, color 0.15s ease, transform 0.1s ease;
      }
      .client-sidebar__btn:hover {
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
      }
      .client-sidebar__btn.is-active {
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
      }
      .client-sidebar__btn:active {
        transform: scale(0.96);
      }
      .client-sidebar__icon {
        display: grid;
        place-items: center;
        width: 20px;
        height: 20px;
      }
      .client-sidebar__icon svg {
        width: 20px;
        height: 20px;
      }
      .client-sidebar__status {
        position: absolute;
        top: 7px;
        right: 7px;
        width: 8px;
        height: 8px;
        border-radius: 50%;
        border: 1.5px solid rgba(12, 12, 16, 0.95);
      }
      .client-sidebar__status--online {
        background: #57e389;
      }
      .client-sidebar__status--speaking {
        background: #ffcc00;
      }
      .client-sidebar__badge {
        position: absolute;
        top: 4px;
        right: 4px;
        min-width: 14px;
        height: 14px;
        padding: 0 3px;
        border-radius: 999px;
        background: #ff2d87;
        color: #fff;
        font-size: 9px;
        font-weight: 700;
        line-height: 14px;
        text-align: center;
      }

      /* Client chrome — responsive tiers (768 / 1024 / short height) */
      @media (max-width: 1023px) {
        :root {
          --client-ui-gap: 6px;
          --client-chat-max-h: min(520px, calc(100vh - var(--client-safe-top) - var(--client-safe-bottom) - 88px));
        }
        .minimap {
          width: min(192px, calc(100vw - var(--client-safe-left) - var(--client-safe-right)));
          height: min(192px, calc(100vw - var(--client-safe-left) - var(--client-safe-right)));
          max-width: 192px;
          max-height: 192px;
        }
      }
      @media (max-width: 767px) {
        :root {
          --client-chat-max-h: min(420px, calc(100vh - var(--client-safe-top) - var(--client-safe-bottom) - 72px));
        }
        .client-shell {
          width: 48px;
        }
        .client-sidebar__btn {
          width: 36px;
          height: 36px;
          min-width: 44px;
          min-height: 44px;
        }
        .chat-panel-wrap {
          left: var(--client-safe-left);
          right: var(--client-safe-right);
          width: auto;
        }
        .chat-panel {
          width: 100%;
          max-width: none;
          border-radius: 16px 16px 0 0;
        }
        .world-location-card {
          width: min(100%, var(--client-hud-max-w));
        }
        .skybox-panel,
        .client-panel {
          width: min(100%, var(--client-panel-max-w));
        }
      }
      @media (max-height: 700px) {
        :root {
          --client-chat-max-h: min(360px, calc(100vh - var(--client-safe-top) - var(--client-safe-bottom) - 64px));
        }
      }

      .client-panel {
        position: fixed;
        left: var(--client-safe-left);
        bottom: var(--client-safe-bottom);
        z-index: 21;
        width: min(280px, var(--client-panel-max-w));
        padding: 14px;
        border-radius: 12px;
        background: rgba(18, 18, 24, 0.96);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      }

      /* NIGHT/DAY skybox popup (Explorer-style) */
      .skybox-panel {
        position: fixed;
        left: var(--client-safe-left);
        z-index: 21;
        width: min(248px, var(--client-panel-max-w));
        padding: 14px 14px 16px;
        border-radius: 14px;
        background: rgba(22, 22, 28, 0.97);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #fff;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
        pointer-events: auto;
      }
      .skybox-panel__header {
        margin: 0 0 12px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        color: rgba(255, 255, 255, 0.92);
      }
      .skybox-panel__row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .skybox-panel__label {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.88);
      }
      .skybox-panel__divider {
        border: 0;
        height: 1px;
        margin: 12px 0;
        background: rgba(255, 255, 255, 0.1);
      }
      .skybox-panel__custom {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .skybox-panel__custom.is-disabled {
        opacity: 0.45;
      }
      .skybox-panel__time {
        font-size: 13px;
        font-variant-numeric: tabular-nums;
        color: rgba(255, 255, 255, 0.92);
      }
      .skybox-panel__switch {
        position: relative;
        display: inline-flex;
        cursor: pointer;
      }
      .skybox-panel__switch input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
      }
      .skybox-panel__switch-track {
        position: relative;
        display: block;
        width: 38px;
        height: 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        transition: background 0.15s ease;
      }
      .skybox-panel__switch-track::after {
        content: '';
        position: absolute;
        top: 3px;
        left: 3px;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        transition: transform 0.15s ease;
      }
      .skybox-panel__switch input:checked + .skybox-panel__switch-track {
        background: rgba(255, 255, 255, 0.32);
      }
      .skybox-panel__switch input:checked + .skybox-panel__switch-track::after {
        transform: translateX(16px);
      }
      .skybox-panel__slider-row {
        display: grid;
        grid-template-columns: 24px 1fr 24px;
        align-items: center;
        gap: 6px;
      }
      .skybox-panel__nudge {
        width: 24px;
        height: 24px;
        border: 0;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.85);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }
      .skybox-panel__nudge:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.08);
      }
      .skybox-panel__nudge:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .skybox-panel input[type='range'] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(
          90deg,
          #3a1f63 0%,
          #4a3a8a 18%,
          #5f8fd4 50%,
          #4a3a8a 82%,
          #3a1f63 100%
        );
        outline: none;
      }
      .skybox-panel input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 22px;
        border: 0;
        border-radius: 7px 7px 10px 10px;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);

      }
      .skybox-panel input[type='range']::-moz-range-thumb {
        width: 14px;
        height: 22px;
        border: 0;
        border-radius: 7px 7px 10px 10px;
        background: #fff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);

      .splash-screen {
        --dcl-site-bg-image: url('https://cdn.decentraland.org/@dcl/jump-site/1.2.0/assets/background--i0ipWGU.webp');
        position: fixed;
        inset: 0;
        z-index: 100;
        overflow: hidden;
        color: #fff;
        background-color: #4a148c;
        background-image: var(--dcl-site-bg-image);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .splash-screen::before {
        content: '';
        position: absolute;
        inset: 0;
        background:
          linear-gradient(90deg, rgba(74, 20, 140, 0.82) 0%, rgba(74, 20, 140, 0.45) 42%, rgba(74, 20, 140, 0.18) 68%, transparent 100%),
          radial-gradient(circle at 18% 20%, rgba(255, 255, 255, 0.08), transparent 35%);
        pointer-events: none;
      }
      .splash-screen__layout {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: minmax(320px, 520px) 1fr;
        align-items: stretch;
        gap: 24px;
        width: min(1180px, calc(100vw - 48px));
        min-height: 100vh;
        margin: 0 auto;
        padding: 48px 0 88px;
      }
      .splash-screen--signed-in .splash-screen__layout {
        width: 100%;
        max-width: none;
        padding-left: max(48px, 6vw);
        padding-right: max(24px, 3vw);
      }
      .splash-screen:not(.splash-screen--signed-in) .splash-screen__layout {
        grid-template-columns: minmax(320px, 520px);
        justify-content: center;
      }
      .splash-screen:not(.splash-screen--signed-in) .splash-screen__stage {
        display: none;
      }
      .splash-screen__copy {
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 12px 8px;
      }
      .splash-screen__logo {
        margin-bottom: 28px;
      }
      .splash-screen__logo svg {
        display: block;
        width: 44px;
        height: 44px;
        filter: drop-shadow(0 8px 18px rgba(0, 0, 0, 0.25));
      }
      .splash-screen__title {
        margin: 0 0 10px;
        font-size: clamp(34px, 4vw, 52px);
        font-weight: 700;
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
      .splash-screen__subtitle {
        margin: 0 0 22px;
        font-size: clamp(18px, 2.2vw, 24px);
        line-height: 1.35;
        color: rgba(255, 255, 255, 0.88);
      }
      .splash-screen__status {
        min-height: 20px;
        margin-bottom: 18px;
        font-size: 13px;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.82);
      }
      .splash-screen__status.is-error {
        color: #ff8a80;
      }
      .splash-screen__actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-width: 360px;
      }
      .splash-screen__btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        min-height: 52px;
        padding: 12px 18px;
        border-radius: 999px;
        border: 0;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: transform 0.1s ease, opacity 0.15s ease, background 0.15s ease;
      }
      .splash-screen__btn:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .splash-screen__btn:active:not(:disabled) {
        transform: scale(0.98);
      }
      .splash-screen__btn--primary {
        background: linear-gradient(135deg, #ff3366 0%, #e91e63 100%);
        color: #fff;
        box-shadow: 0 10px 28px rgba(233, 30, 99, 0.35);
      }
      .splash-screen__btn--secondary {
        background: rgba(18, 10, 30, 0.72);
        color: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      .splash-screen__btn--ghost {
        background: transparent;
        color: rgba(255, 255, 255, 0.72);
        letter-spacing: 0.04em;
        text-transform: none;
        font-weight: 700;
      }
      .splash-screen__btn-arrow {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        font-size: 14px;
        line-height: 1;
      }
      .splash-screen__stage {
        position: relative;
        align-self: stretch;
        width: 100%;
        min-height: calc(100vh - 96px);
        pointer-events: none;
      }
      .splash-screen__canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
      }
      .splash-screen__version {
        position: absolute;
        left: 24px;
        bottom: 18px;
        z-index: 2;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
      }
      @media (max-width: 1023px) {
        .splash-screen__layout {
          grid-template-columns: 1fr;
          padding-top: 72px;
        }
        .splash-screen--signed-in .splash-screen__stage {
          min-height: 52vh;
          order: -1;
        }
      }

      /* ── Auth provider grid ──────────────────────────────── */
      .splash-auth-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        max-width: 360px;
        margin-top: 4px;
      }
      .splash-auth-grid__item {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        min-height: 50px;
        padding: 10px 16px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.10);
        background: rgba(18, 10, 30, 0.62);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.01em;
        cursor: pointer;

      }
      .splash-auth-grid__item:hover:not(:disabled):not(.splash-auth-grid__item--disabled) {
        background: rgba(30, 14, 56, 0.82);
        border-color: rgba(255, 255, 255, 0.18);
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
        transform: translateY(-1px);
      }
      .splash-auth-grid__item:active:not(:disabled):not(.splash-auth-grid__item--disabled) {
        transform: scale(0.98);
      }
      .splash-auth-grid__item:disabled,
      .splash-auth-grid__item--disabled {
        opacity: 0.45;
        cursor: default;
      }
      .splash-auth-grid__item--metamask {
        border-color: rgba(246, 133, 27, 0.30);
      }
      .splash-auth-grid__item--metamask:hover:not(:disabled) {
        border-color: rgba(246, 133, 27, 0.55);
        box-shadow: 0 4px 22px rgba(246, 133, 27, 0.18);
      }
      .splash-auth-grid__item--wide {
        grid-column: 1 / -1;
      }
      .splash-auth-grid__icon {
        flex-shrink: 0;
        width: 24px;
        height: 24px;
      }
      .splash-auth-grid__icon svg {
        display: block;
        width: 100%;
        height: 100%;
      }
      .splash-auth-grid__label {
        flex: 1;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .splash-auth-grid__badge {
        flex-shrink: 0;
        padding: 2px 7px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        font-size: 9px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: rgba(255, 255, 255, 0.50);
      }
      .splash-auth-divider {
        display: flex;
        align-items: center;
        gap: 12px;
        max-width: 360px;
        margin: 6px 0;
        color: rgba(255, 255, 255, 0.40);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .splash-auth-divider::before,
      .splash-auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: rgba(255, 255, 255, 0.12);
      }
      .splash-session-hint {
        margin-top: 14px;
        max-width: 360px;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.45);
        line-height: 1.45;
      }
      .splash-session-hint--warn {
        color: #ffab40;
      }
      @media (max-width: 767px) {
        .splash-auth-grid {
          grid-template-columns: 1fr;
        }
      }

      .loading-screen {
        --loading-progress: 0;
        position: fixed;
        inset: 0;
        z-index: 110;
        display: flex;
        flex-direction: column;
        background-color: #0c0b0f;
        color: #eceaf0;
        overflow: hidden;
      }
      .loading-screen__progress {
        position: relative;
        z-index: 2;
        flex-shrink: 0;
        width: 100%;
        padding-top: env(safe-area-inset-top, 0px);
      }
      .loading-screen__progress-track {
        height: 9px;
        width: 100%;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      .loading-screen__progress-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #ff2d55 0%, #ff5478 100%);
        box-shadow: 0 0 16px rgba(255, 45, 85, 0.45);
        transition: width 0.08s linear;
      }
      .loading-screen__layout {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        flex-direction: column;
      }
      .loading-screen__featured {
        position: absolute;
        inset: 0;
        perspective: 1200px;
      }
      .loading-screen__slide {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        overflow: hidden;
        background: #0c0b0f;
        opacity: 0;
        transform: rotateY(-90deg);
        transform-origin: center center;
        pointer-events: none;
        backface-visibility: hidden;
      }
      .loading-screen__slide--active {
        opacity: 1;
        transform: rotateY(0deg);
        pointer-events: auto;
      }
      .loading-screen__slide--enter {
        animation: loading-slide-enter 0.42s ease forwards;
      }
      .loading-screen__slide--exit {
        animation: loading-slide-exit 0.42s ease forwards;
      }
      .loading-screen__slide-media {
        position: absolute;
        inset: 0;
      }
      .loading-screen__slide-media img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .loading-screen__slide-media--fallback {
        background-size: cover;
        background-position: center;
      }
      .loading-screen__slide-shade {
        position: absolute;
        inset: 0;
        background: linear-gradient(
          180deg,
          rgba(8, 7, 10, 0) 0%,
          rgba(8, 7, 10, 0.1) 35%,
          rgba(8, 7, 10, 0.7) 70%,
          rgba(8, 7, 10, 0.95) 100%
        );
      }
      .loading-screen__slide-copy {
        position: relative;
        z-index: 1;
        padding: 40px 48px 80px;
        max-width: 680px;
      }
      .loading-screen__slide-tag {
        display: inline-block;
        margin-bottom: 12px;
        padding: 5px 12px;
        border-radius: 999px;
        background: rgba(255, 45, 85, 0.2);
        border: 1px solid rgba(255, 45, 85, 0.4);
        color: #ff8aa3;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .loading-screen__slide-title {
        margin: 0 0 10px;
        font-size: clamp(28px, 4vw, 44px);
        font-weight: 700;
        line-height: 1.08;
        letter-spacing: -0.02em;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.5);
      }
      .loading-screen__slide-subtitle {
        margin: 0;
        font-size: clamp(15px, 2vw, 19px);
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.88);
        max-width: 52ch;
        text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
      }
      .loading-screen__dots {
        position: absolute;
        bottom: 32px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .loading-screen__dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.3);
        transition: background 0.25s ease, transform 0.25s ease;
      }
      .loading-screen__dot.is-active {
        background: #ff2d55;
        transform: scale(1.25);
      }
      .loading-screen__status {
        display: none;
      }
      .loading-screen__hydration-timer {
        position: absolute;
        right: 24px;
        bottom: 24px;
        z-index: 3;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        padding: 10px 14px;
        border-radius: 10px;
        background: rgba(8, 10, 18, 0.72);
        border: 1px solid rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
        font-variant-numeric: tabular-nums;
        pointer-events: none;
      }
      .loading-screen__hydration-label {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      .loading-screen__hydration-time {
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
        color: #fff;
      }
      .loading-screen__hydration-detail {
        max-width: 220px;
        font-size: 11px;
        line-height: 1.35;
        text-align: right;
        color: rgba(255, 255, 255, 0.62);
      }
      .loading-screen__hydration-timer.is-ready .loading-screen__hydration-label {
        color: #6ee7a8;
      }
      .loading-screen__hydration-timer.is-ready .loading-screen__hydration-time {
        color: #6ee7a8;
        font-size: 22px;
      }
      .loading-screen__hydration-timer.is-timeout .loading-screen__hydration-label {
        color: #ffb347;
      }
      .loading-screen__hydration-timer.is-timeout .loading-screen__hydration-time {
        color: #ffb347;
      }
      .loading-screen.is-hiding {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      @keyframes loading-slide-enter {
        from {
          opacity: 0;
          transform: rotateY(90deg);
        }
        to {
          opacity: 1;
          transform: rotateY(0deg);
        }
      }
      @keyframes loading-slide-exit {
        from {
          opacity: 1;
          transform: rotateY(0deg);
        }
        to {
          opacity: 0;
          transform: rotateY(-90deg);
        }
      }
      @media (max-width: 767px) {
        .loading-screen__slide-copy {
          padding: 24px 24px 72px;
        }
        .loading-screen__dots {
          bottom: 24px;
        }
      }

      .profile-popup-backdrop {

        z-index: 90;
        background: transparent;
      }

      .profile-popup__wallet-value {

      /* Chat — compact bottom-left window with channel rail on the right */
      .chat-panel-wrap {
        position: fixed;
        left: var(--client-safe-left);
        bottom: var(--client-safe-bottom);
        z-index: 110;
        display: flex;
        flex-direction: row;
        align-items: stretch;
        pointer-events: auto;
        height: var(--client-chat-max-h);
        max-height: var(--client-chat-max-h);
        overflow: hidden;
        --chat-panel-bg: rgba(28, 20, 16, 0.94);
        --chat-panel-border: rgba(255, 255, 255, 0.1);
        --chat-panel-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        --chat-rail-bg: rgba(20, 14, 12, 0.96);
        --chat-rail-border: rgba(255, 255, 255, 0.1);
        --chat-rail-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .chat-panel-wrap.is-scene-mode {
        --chat-panel-bg: rgba(28, 20, 16, 0);
        --chat-panel-border: rgba(255, 255, 255, 0);
        --chat-panel-shadow: none;
        --chat-rail-bg: rgba(20, 14, 12, 0);
        --chat-rail-border: rgba(255, 255, 255, 0);
        --chat-rail-shadow: none;
      }
      .chat-panel-wrap.is-scene-mode:hover,
      .chat-panel-wrap.is-chat-pinned {
        --chat-panel-bg: rgba(28, 20, 16, 0.94);
        --chat-panel-border: rgba(255, 255, 255, 0.1);
        --chat-panel-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        --chat-rail-bg: rgba(20, 14, 12, 0.96);
        --chat-rail-border: rgba(255, 255, 255, 0.1);
        --chat-rail-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__rail {
        visibility: hidden;
        pointer-events: none;
      }
      .chat-panel-wrap.is-scene-mode:hover .chat-panel__rail,
      .chat-panel-wrap.is-chat-pinned .chat-panel__rail {
        visibility: visible;
        pointer-events: auto;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__header {
        border-bottom-color: transparent;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__composer {
        border-top-color: transparent;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__rail-btn,
      .chat-panel-wrap.is-scene-mode .chat-panel__rail-btn.is-active {
        background: transparent;
        border-color: transparent;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__rail-btn--svg {
        background: transparent;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__close {
        background: transparent;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__rail-scroll {
        scrollbar-color: transparent transparent;
      }
      .chat-panel-wrap.is-scene-mode .chat-panel__rail-scroll::-webkit-scrollbar-thumb {
        background: transparent;
      }
      .chat-panel-wrap.is-scene-mode:hover .chat-panel__header,
      .chat-panel-wrap.is-chat-pinned .chat-panel__header {
        border-bottom-color: rgba(255, 255, 255, 0.08);
      }
      .chat-panel-wrap.is-scene-mode:hover .chat-panel__composer,
      .chat-panel-wrap.is-chat-pinned .chat-panel__composer {
        border-top-color: rgba(255, 255, 255, 0.08);
      }
      .chat-panel-wrap.is-scene-mode:hover .chat-panel__rail-btn,
      .chat-panel-wrap.is-chat-pinned .chat-panel__rail-btn {
        background: rgba(255, 255, 255, 0.08);
        border-color: rgba(255, 255, 255, 0.12);
      }
      .chat-panel-wrap.is-scene-mode:hover .chat-panel__rail-btn--svg,
      .chat-panel-wrap.is-chat-pinned .chat-panel__rail-btn--svg {

      }
      .chat-panel-wrap.is-scene-mode:hover .chat-panel__close,
      .chat-panel-wrap.is-chat-pinned .chat-panel__close {
