        font-size: 0.75rem;
        font-weight: 700;
        background: rgba(71, 140, 224, 0.45);
      }
      .map-view .dcl-map__hud {
        position: absolute;
        z-index: 10;
        pointer-events: none;
      }
      .map-view .dcl-map__hud > * {
        pointer-events: auto;
      }
      .map-view .dcl-map__hud--top {
        top: 0;
        left: 0;
        right: var(--dcl-map-sidebar-w);
        display: flex;
        flex-wrap: wrap;
        align-items: flex-end;
        justify-content: space-between;
        gap: 1rem 1.5rem;
        padding: clamp(0.75rem, 2vw, 1.25rem);
        background: linear-gradient(180deg, rgba(8, 10, 16, 0.92) 0%, transparent 100%);
      }
      .map-view .dcl-map__eyebrow {
        margin: 0 0 0.25rem;
        font-size: 0.75rem;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__title {
        margin: 0;
        font-size: clamp(1.1rem, 2vw, 1.5rem);
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }
      .map-view .dcl-map__hud-controls {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 0.75rem;
      }
      .map-view .dcl-map__status {
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 0.25rem 0.65rem;
        border-radius: 999px;
        border: 1px solid rgba(71, 140, 224, 0.35);
        background: var(--dcl-surface);
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__status--live {
        color: #47d99e;
        border-color: rgba(71, 217, 158, 0.45);
      }
      .map-view .dcl-map__status--loading {
        color: var(--dcl-blue);
      }
      .map-view .dcl-map__status--error {
        color: #ff6b6b;
        border-color: rgba(255, 107, 107, 0.45);
      }
      .map-view .dcl-map__count {
        font-size: 0.85rem;
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__btn {
        padding: 0.4rem 0.85rem;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        background: var(--dcl-surface);
        cursor: pointer;
        font-size: 0.72rem;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: inherit;
      }
      .map-view .dcl-map__btn:hover {
        border-color: rgba(71, 140, 224, 0.55);
        color: #fff;
      }
      .map-view .dcl-map__sidebar {
        position: absolute;
        top: 0;
        right: 0;
        bottom: 0;
        width: var(--dcl-map-sidebar-w);
        z-index: 12;
        display: flex;
        flex-direction: column;
        background: rgba(10, 12, 18, 0.94);
        border-left: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
      }
      .map-view .dcl-map__sidebar-section {
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .map-view .dcl-map__sidebar-section--genesis {
        flex: 2;
      }
      .map-view .dcl-map__sidebar-section--worlds {
        flex: 1;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .map-view .dcl-map__sidebar-head {
        padding: 1rem 1rem 0.75rem;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .map-view .dcl-map__sidebar-head--compact {
        padding: 0.75rem 1rem 0.6rem;
      }
      .map-view .dcl-map__sidebar-title {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .map-view .dcl-map__sidebar-meta {
        margin: 0.35rem 0 0;
        font-size: 0.8rem;
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__search {
        display: block;
        margin-top: 0.85rem;
      }
      .map-view .dcl-map__search-label {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      .map-view .dcl-map__search-input {
        width: 100%;
        padding: 0.5rem 0.75rem;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(8, 10, 16, 0.85);
        color: var(--dcl-text);
        font-size: 0.875rem;
      }
      .map-view .dcl-map__search-input::placeholder {
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__search-input:focus {
        outline: none;
        border-color: rgba(71, 140, 224, 0.55);
        box-shadow: 0 0 0 2px rgba(71, 140, 224, 0.2);
      }
      .map-view .dcl-map__sidebar-body {
        flex: 1;
        min-height: 0;
        overflow: auto;
        padding: 0.5rem 0;
      }
      .map-view .dcl-map__sidebar-empty {
        margin: 1rem;
        font-size: 0.9rem;
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__player-list,
      .map-view .dcl-map__world-list {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .map-view .dcl-map__player-row {
        display: grid;
        grid-template-columns: 32px 1fr auto;
        align-items: center;
        gap: 0.65rem;
        width: 100%;
        padding: 0.55rem 1rem;
        border: 0;
        background: transparent;
        text-align: left;
        cursor: pointer;
        color: inherit;
      }
      .map-view .dcl-map__player-row:hover:not(:disabled) {
        background: rgba(71, 140, 224, 0.12);
      }
      .map-view .dcl-map__player-row--highlighted {
        background: rgba(71, 140, 224, 0.24);
      }
      .map-view .dcl-map__player-row:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .map-view .dcl-map__player-row .dcl-map__avatar-img,
      .map-view .dcl-map__player-row .dcl-map__avatar-fallback {
        width: 32px;
        height: 32px;
      }
      .map-view .dcl-map__player-name {
        font-size: 0.9rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .map-view .dcl-map__player-parcel {
        font-size: 0.72rem;
        color: var(--dcl-muted);
      }
      .map-view .dcl-map__world-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.5rem 1rem;
      }
      .map-view .dcl-map__world-name {
        font-size: 0.82rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .map-view .dcl-map__world-count {
        flex-shrink: 0;
        min-width: 1.5rem;
        padding: 0.15rem 0.45rem;
        border-radius: 999px;
        font-size: 0.68rem;
        font-weight: 700;
        text-align: center;
        color: #47d99e;
        background: rgba(71, 217, 158, 0.12);
        border: 1px solid rgba(71, 217, 158, 0.28);
      }
      .map-view .dcl-map__sidebar-foot {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.06);
        font-size: 0.75rem;
        color: var(--dcl-muted);
        flex-shrink: 0;
      }
      .map-view .dcl-map__error {
        position: absolute;
        left: 1rem;
        bottom: 1rem;
        right: calc(var(--dcl-map-sidebar-w) + 1rem);
        margin: 0;
        padding: 0.65rem 0.85rem;
        border-radius: 8px;
        background: rgba(120, 24, 32, 0.92);
        border: 1px solid rgba(255, 107, 107, 0.45);
        font-size: 0.85rem;
        z-index: 20;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
      }
      .map-view .dcl-map__error--worlds {
        bottom: 4rem;
      }
      .map-view .dcl-map__parcel-popup-backdrop {
        position: absolute;
        inset: 0;
        right: var(--dcl-map-sidebar-w);
        z-index: 30;
        display: flex;
        align-items: flex-end;
        justify-content: center;
        padding: 0 1rem 1.25rem;
        background: linear-gradient(180deg, transparent 55%, rgba(4, 6, 10, 0.62) 100%);
      }
      .map-view .dcl-map__parcel-popup-backdrop[hidden] {
        display: none !important;
        pointer-events: none !important;
      }
      .map-view .dcl-map__parcel-popup {
        position: relative;
        width: min(440px, 100%);
        max-height: min(42vh, 320px);
        overflow: auto;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: #f4f6fb;
        color: #1a1d24;
        box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
      }
      .map-view .dcl-map__parcel-popup-close {
        position: absolute;
        top: 0.5rem;
        right: 0.5rem;
        z-index: 2;
        width: 2rem;
        height: 2rem;
        border: 0;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #1a1d24;
        font-size: 1.35rem;
        line-height: 1;
        cursor: pointer;
      }
      .map-view .dcl-map__parcel-popup-close:hover {
        background: #fff;
      }
      .map-view .dcl-map__parcel-popup-preview {
        aspect-ratio: 16 / 10;
        background: #d8dde8;
        overflow: hidden;
      }
      .map-view .dcl-map__parcel-popup-preview img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .map-view .dcl-map__parcel-popup-preview-fallback {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #c5ccd8, #e8ebf2);
      }
      .map-view .dcl-map__parcel-popup-body {
        padding: 1rem 1rem 1.15rem;
      }
      .map-view .dcl-map__parcel-popup-coords {
        margin: 0 0 0.35rem;
        font-size: 0.95rem;
        color: #4a5160;
      }
      .map-view .dcl-map__parcel-popup-name {
        margin: 0 0 0.35rem;
        font-size: 1.15rem;
        font-weight: 700;
        color: #1a1d24;
      }
      .map-view .dcl-map__parcel-popup-desc {
        margin: 0 0 0.85rem;
        font-size: 0.9rem;
        color: #4a5160;
      }
      .map-view .dcl-map__parcel-popup-jump {
        width: 100%;
        padding: 0.65rem 1rem;
        border: 0;
        border-radius: 8px;
        background: #478ce0;
        color: #fff;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .map-view .dcl-map__parcel-popup-jump:hover {
        background: #3a7fd4;
      }
      .map-view .dcl-map__parcel-popup-loading,
      .map-view .dcl-map__parcel-popup-error {
        margin: 0;
        padding: 2rem 1.25rem;
        text-align: center;
        font-size: 0.95rem;
      }
      .map-view .dcl-map__parcel-popup-error {
        color: #b42318;
      }
      @media (max-width: 1023px) {
        .map-view.dcl-map-page {
          --dcl-map-sidebar-w: min(280px, 42vw);
        }
      }
      .map-view .dcl-map__sidebar-toolbar {
        display: none;
      }
      .map-view .dcl-map__sidebar-toggle {
        display: none;
      }
      .map-view .dcl-map__sidebar-backdrop {
        display: none;
      }
      @media (max-width: 767px) {
        .map-view.dcl-map-page {
          --dcl-map-sidebar-w: 0px;
        }
        .map-view.dcl-map-page.is-sidebar-open {
          --dcl-map-sidebar-w: min(300px, 88vw);
        }
        .map-view .dcl-map__viewport {
          right: 0;
        }
        .map-view .dcl-map__hud--top {
          right: 0;
          padding: 0.65rem 3.25rem 0.65rem 0.75rem;
          gap: 0.5rem;
        }
        .map-view .dcl-map__eyebrow {
          display: none;
        }
        .map-view .dcl-map__title {
          font-size: 0.95rem;
        }
        .map-view .dcl-map__hud-controls {
          width: 100%;
          overflow-x: auto;
          flex-wrap: nowrap;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          padding-bottom: 2px;
        }
        .map-view .dcl-map__hud-controls::-webkit-scrollbar {
          display: none;
        }
        .map-view .dcl-map__btn {
          flex-shrink: 0;
        }
        .map-view .dcl-map__sidebar-toggle {
          display: grid;
          place-items: center;
          position: absolute;
          top: max(10px, env(safe-area-inset-top, 0px));
          right: max(10px, env(safe-area-inset-right, 0px));
          z-index: 16;
          width: 40px;
          height: 40px;
          padding: 0;
          border: 1px solid rgba(255, 255, 255, 0.14);
          border-radius: 12px;
          background: rgba(12, 14, 20, 0.92);
          color: #fff;
          cursor: pointer;
          pointer-events: auto;
          touch-action: manipulation;
          box-shadow: 0 6px 18px rgba(0, 0, 0, 0.35);
        }
        .map-view.is-sidebar-open .dcl-map__sidebar-toggle {
          border-color: rgba(255, 255, 255, 0.22);
          background: rgba(20, 22, 30, 0.96);
        }
        .map-view .dcl-map__sidebar-toggle svg {
          width: 20px;
          height: 20px;
        }
        .map-view .dcl-map__sidebar-backdrop {
          display: block;
          position: absolute;
          inset: 0;
          z-index: 11;
          background: rgba(0, 0, 0, 0.45);
          pointer-events: auto;
          cursor: pointer;
        }
        .map-view .dcl-map__sidebar-backdrop[hidden] {
          display: none !important;
        }
        .map-view .dcl-map__sidebar {
          transform: translateX(100%);
          transition: transform 0.24s ease;
          box-shadow: -10px 0 32px rgba(0, 0, 0, 0.45);
        }
        .map-view.is-sidebar-open .dcl-map__sidebar {
          transform: translateX(0);
        }
        .map-view .dcl-map__sidebar-toolbar {
          display: flex;
          align-items: center;
          justify-content: space-between;
          gap: 8px;
          padding: 10px 12px;
          border-bottom: 1px solid rgba(255, 255, 255, 0.08);
          flex-shrink: 0;
        }
        .map-view .dcl-map__sidebar-toolbar-title {
          font-size: 0.72rem;
          font-weight: 700;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: var(--dcl-muted);
        }
        .map-view .dcl-map__sidebar-close {
          width: 32px;
          height: 32px;
          padding: 0;
          border: none;
          border-radius: 50%;
          background: rgba(255, 255, 255, 0.1);
          color: #fff;
          font-size: 20px;
          line-height: 1;
          cursor: pointer;
        }
        .map-view .dcl-map__error {
          right: 0.75rem;
          left: 0.75rem;
        }
        .map-view .dcl-map__parcel-popup-backdrop {
          right: 0;
        }
      }

      /* ===== Backpack View ===== */
      .backpack-view {
        display: flex;
        flex-direction: column;
        height: 100%;
      }
      .backpack-view__sub-header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 24px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .backpack-view__title {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .backpack-view__sub-tabs {
        display: flex;
        gap: 4px;
      }
      .backpack-view__sub-tab {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border: none;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.75);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .backpack-view__sub-tab.is-active {
        background: #ff2d55;
        color: #fff;
      }
      .backpack-view__toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-left: auto;
      }
      .backpack-view__filter-btn {
        padding: 6px 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.85);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
      }
      .backpack-view__search {
        width: 180px;
        padding: 6px 12px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.25);
        color: #fff;
        font-size: 12px;
      }
      .backpack-view__search::placeholder {
        color: rgba(255, 255, 255, 0.45);
      }
      .backpack-view__columns {
        display: grid;
        grid-template-columns: 1fr 2fr 1fr;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .backpack-view__left {
        position: relative;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 16px;
        overflow: hidden;
      }
      .backpack-view__avatar-stage {
        position: relative;
        width: 100%;
        height: 100%;
        min-height: 300px;
      }
      .backpack-view__canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        display: block;
      }
      .backpack-view__middle {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border-left: 1px solid rgba(255, 255, 255, 0.06);
        border-right: 1px solid rgba(255, 255, 255, 0.06);
      }
      .backpack-view__middle-tabs {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        flex-shrink: 0;
      }
      .backpack-view__mid-tab {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.6);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        cursor: pointer;
      }
      .backpack-view__mid-tab.is-active {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }
      .backpack-view__marketplace-link {
        margin-left: auto;
        padding: 6px 14px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.85);
        font-size: 11px;
        font-weight: 700;
        text-decoration: none;
        letter-spacing: 0.04em;
      }
      .backpack-view__middle-body {
        display: flex;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .backpack-view__categories {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        width: 188px;
        flex-shrink: 0;
        padding: 10px 8px;
        overflow-y: auto;
        border-right: 1px solid rgba(255, 255, 255, 0.06);
        align-content: start;
      }
      .backpack-view__cat-btn {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 4px;
        width: 100%;
        padding: 0;
        border: 2px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.22);
        color: rgba(255, 255, 255, 0.72);
        font-size: 9px;
        font-weight: 700;
        cursor: pointer;
        text-align: center;
        overflow: hidden;
        transition: border-color 0.12s, background 0.12s, color 0.12s, box-shadow 0.12s;
      }
      .backpack-view__cat-btn--all {
        grid-column: 1 / -1;
      }
      .backpack-view__cat-btn:hover {
        border-color: rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.92);
      }
      .backpack-view__cat-btn.is-active {
        border-color: rgba(255, 45, 85, 0.75);
        background: rgba(255, 45, 85, 0.12);
        color: #fff;
        box-shadow: 0 0 0 1px rgba(255, 45, 85, 0.35);
      }
      .backpack-view__cat-thumb {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        background: rgba(0, 0, 0, 0.35);
        overflow: hidden;
        display: grid;
        place-items: center;
      }
      .backpack-view__cat-equipped {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .backpack-view__cat-slot-icon,
      .backpack-view__cat-all-icon {
        font-size: 22px;
        line-height: 1;
        opacity: 0.55;
      }
      .backpack-view__cat-all-icon {
        font-size: 26px;
        opacity: 0.85;
      }
      .backpack-view__cat-label {
        padding: 0 4px 6px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        letter-spacing: 0.02em;
      }
      .backpack-view__grid-area {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-width: 0;
        padding: 12px;
        overflow-y: auto;
      }
      .backpack-view__grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        grid-template-rows: repeat(4, minmax(0, 1fr));
        gap: 10px;
        flex: 1;
        width: min(100%, 392px);
        min-height: 392px;
        align-content: start;
      }
      .backpack-view__item {
        position: relative;
        width: 100%;
        aspect-ratio: 1;
        min-height: 0;
        border-radius: 10px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        background: rgba(0, 0, 0, 0.3);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.12s, box-shadow 0.12s;
      }
      .backpack-view__item:hover {
        transform: scale(1.04);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
      }
      .backpack-view__item.is-selected {
        box-shadow: 0 0 0 2px #fff, 0 4px 16px rgba(255, 255, 255, 0.2);
      }
      .backpack-view__item--empty {
        border-color: rgba(255, 255, 255, 0.06);
        cursor: default;
      }
      .backpack-view__item--empty:hover {
        transform: none;
        box-shadow: none;
      }
      .backpack-view__item-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .backpack-view__pagination {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        padding: 10px 0 4px;
        flex-shrink: 0;
      }
      .backpack-view__page-btn {
        min-width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.75);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.12s;
      }
      .backpack-view__page-btn:hover:not(:disabled) {
        background: rgba(255, 255, 255, 0.15);
      }
      .backpack-view__page-btn.is-active {
        background: #ff2d55;
        color: #fff;
      }
      .backpack-view__page-btn:disabled {
        opacity: 0.35;
        cursor: default;
      }
      .backpack-view__right {
        display: flex;
        flex-direction: column;
        padding: 16px;
        overflow-y: auto;
      }
      .backpack-view__detail {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .backpack-view__detail-empty {
        color: rgba(255, 255, 255, 0.45);
        font-size: 14px;
      }
      .backpack-view__detail-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        text-align: center;
      }
      .backpack-view__detail-img {
        width: 120px;
        height: 120px;
        border-radius: 12px;
        object-fit: cover;
        background: rgba(0, 0, 0, 0.3);
      }
      .backpack-view__detail-name {
        margin: 0;
        font-size: 16px;
        font-weight: 700;
        word-break: break-all;
      }
      .backpack-view__detail-rarity {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .backpack-view__detail-urn {
        margin: 8px 0 0;
        font-size: 10px;
        color: rgba(255, 255, 255, 0.4);
        word-break: break-all;
        line-height: 1.4;
      }

      /* ===== Events View (settings overlay) ===== */
      .events-view {
        --ev-surface: rgba(8, 10, 16, 0.72);
        --ev-border: rgba(255, 255, 255, 0.08);
        --ev-accent: #ff2d55;
        --ev-muted: rgba(255, 255, 255, 0.55);
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        padding: 12px 20px 16px;
        gap: 10px;
        background: rgba(0, 0, 0, 0.18);
        color: #fff;
        overflow: hidden;
      }
      .events-view__list-shell {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        gap: 10px;
        overflow: hidden;
      }
      .events-view--weekly .events-view__list-shell {
        display: contents;
      }
      .events-view__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-shrink: 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--ev-border);
      }
      .events-view__header-left {
        display: flex;
        align-items: baseline;
        gap: 12px;
        min-width: 0;
      }
      .events-view__title {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .events-view__month-label {
        font-size: 13px;
        font-weight: 600;
        color: var(--ev-muted);
        white-space: nowrap;
      }
      .events-view__header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .events-view__week-nav {
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 2px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--ev-border);
      }
      .events-view--calendar .events-view__week-nav {
        display: none;
      }
      .events-view__week-nav-btn {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.88);
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }
      .events-view__week-nav-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .events-view__view-toggle {
        display: flex;
        align-items: stretch;
        gap: 2px;
        padding: 2px;
        border-radius: 8px;
        border: 1px solid var(--ev-border);
        background: rgba(255, 255, 255, 0.04);
      }
      .events-view__view-btn {
        padding: 6px 12px;
        border: none;
        border-radius: 6px;
        background: transparent;
        color: rgba(255, 255, 255, 0.65);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
      }
      .events-view__view-btn:hover {
        color: rgba(255, 255, 255, 0.88);
      }
      .events-view__view-btn.is-active {
        background: var(--ev-accent);
        color: #fff;
      }
      .events-view__btn {
        padding: 7px 14px;
        border-radius: 8px;
        border: 1px solid var(--ev-border);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .events-view__btn--ghost {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.88);
      }
      .events-view__btn--ghost:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .events-view__btn--primary {
        background: rgba(255, 45, 85, 0.22);
        border-color: rgba(255, 45, 85, 0.45);
        color: #fff;
      }
      .events-view__btn--primary:hover {
        background: rgba(255, 45, 85, 0.34);
      }
      .events-view__status {
        margin: 0;
        font-size: 12px;
        flex-shrink: 0;
      }
      .events-view__status--loading {
        color: rgba(255, 255, 255, 0.65);
      }
      .events-view__status--error {
        color: #ffb4b4;
      }
      .events-view__dow-row {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 4px;
        flex-shrink: 0;
        padding: 0 2px;
        max-width: calc(75% - 8px);
      }
      .events-view__dow-cell {
        text-align: center;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--ev-muted);
        text-transform: uppercase;
      }
      .events-view__main {
        display: grid;
        grid-template-columns: 3fr 1fr;
        gap: 12px;
        flex: 1 1 0;
        min-height: 0;
        height: 100%;
        align-self: stretch;
      }
      .events-view__calendar-pane {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
        background: var(--ev-surface);
        border: 1px solid var(--ev-border);
        border-radius: 12px;
        overflow: hidden;
      }
      .events-view__calendar-toolbar {
        display: flex;
        justify-content: flex-end;
        gap: 4px;
        padding: 6px 8px;
        border-bottom: 1px solid var(--ev-border);
        flex-shrink: 0;
      }
      .events-view__cal-nav {
        width: 28px;
        height: 28px;
        border: none;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 18px;
        line-height: 1;
        cursor: pointer;
      }
      .events-view__cal-nav:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .events-view__calendar-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        grid-template-rows: repeat(6, minmax(0, 1fr));
        gap: 4px;
        flex: 1;
        min-height: 0;
        padding: 8px;
        overflow: auto;
      }
      .events-view__day {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 2px;
        min-height: 44px;
        padding: 4px 2px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.03);
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
        transition: background 0.12s, border-color 0.12s;
      }
      .events-view__day:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .events-view__day--muted {
        color: rgba(255, 255, 255, 0.28);
        background: transparent;
      }
      .events-view__day--today {
        border-color: rgba(255, 255, 255, 0.35);
      }
      .events-view__day--selected {
        background: rgba(255, 45, 85, 0.22);
        border-color: rgba(255, 45, 85, 0.55);
      }
      .events-view__day--has-events .events-view__day-num {
        font-weight: 800;
      }
      .events-view__day-num {
        font-size: 12px;
        font-weight: 600;
        line-height: 1.2;
      }
      .events-view__day-dots {
        font-size: 6px;
        line-height: 1;
        letter-spacing: 1px;
        color: var(--ev-accent);
      }
      .events-view__highlight {
        min-height: 0;
        min-width: 0;
        overflow-y: auto;
        background: var(--ev-surface);
        border: 1px solid var(--ev-border);
        border-radius: 12px;
        padding: 12px;
      }
      .events-view--calendar .events-view__highlight {
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .events-view__highlight-empty {
        margin: 0;
        padding: 24px 8px;
        text-align: center;
        color: var(--ev-muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .events-view__highlight-card {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .events-view__highlight-hero {
        position: relative;
      }
      .events-view__highlight-img {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        display: block;
      }
      .events-view__highlight-img--fallback {
        display: grid;
        place-items: center;
        font-size: 28px;
      }
      .events-view__live-badge {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 1;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 45, 85, 0.28);
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }
      .events-view__highlight-name {
        margin: 0;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.35;
      }
      .events-view__highlight-meta {
        margin: 0;
        font-size: 11px;
        color: var(--ev-muted);
        line-height: 1.35;
      }
      .events-view__highlight-organizer {
        margin: 0;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.72);
      }
      .events-view__organizer {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .events-view__organizer-avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.08);
      }
      .events-view__organizer-avatar--fallback {
        display: grid;
        place-items: center;
        font-size: 14px;
      }
      .events-view__organizer-text {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .events-view__organizer-name {
        font-size: 11px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.9);
      }
      .events-view__organizer-location {
        font-size: 10px;
        color: var(--ev-muted);
      }
      .events-view__highlight-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }
      .events-view__jump-btn {
        flex: 1;
        padding: 9px 14px;
        border: none;
        border-radius: 8px;
        background: var(--ev-accent);
        color: #fff;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        cursor: pointer;
      }
      .events-view__jump-btn:hover {
        filter: brightness(1.08);
      }
      .events-view__jump-btn--sm {
        flex: 1;
        padding: 6px 10px;
        font-size: 10px;
      }
      .events-view__icon-btn {
        width: 36px;
        height: 36px;
        display: grid;
        place-items: center;
        border: 1px solid var(--ev-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.88);
        cursor: pointer;
      }
      .events-view__icon-btn:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .events-view__icon-btn--sm {
        width: 32px;
        height: 32px;
        flex-shrink: 0;
      }
      .events-view__schedule,
      .events-view__what {
        padding-top: 8px;
        border-top: 1px solid var(--ev-border);
      }
      .events-view__schedule-title,
      .events-view__what-title {
        margin: 0 0 6px;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.55);
      }
      .events-view__schedule-line {
        margin: 0;
        font-size: 11px;
        color: rgba(255, 255, 255, 0.82);
      }
      .events-view__schedule-recur {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 6px 0 0;
        font-size: 11px;
        color: var(--ev-muted);
      }
      .events-view__day-panel {
        display: flex;
        flex-direction: column;
        gap: 10px;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .events-view__day-panel-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 8px;
        flex-shrink: 0;
      }
      .events-view__day-panel-title {
        margin: 0;
        font-size: 14px;
        font-weight: 800;
      }
      .events-view__day-panel-count {
        font-size: 10px;
        color: var(--ev-muted);
        font-weight: 600;
      }
      .events-view__day-panel-detail {
        display: flex;
        flex-direction: column;
        gap: 8px;
        flex-shrink: 0;
        max-height: 45%;
        min-height: 0;
        overflow-y: auto;
      }
      .events-view__back-btn {
        align-self: flex-start;
        padding: 4px 0;
        border: none;
        background: none;
        color: var(--ev-accent);
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
      }
      .events-view__day-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        scrollbar-width: thin;
        scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
      }
      .events-view__day-list::-webkit-scrollbar {
        width: 5px;
      }
      .events-view__day-list::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.25);
        border-radius: 999px;
      }
      .events-view__day-item {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        padding: 6px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: inherit;
        text-align: left;
        cursor: pointer;
      }
      .events-view__day-item:hover {
        background: rgba(255, 255, 255, 0.08);
      }
      .events-view__day-item.is-selected {
        border-color: rgba(255, 45, 85, 0.55);
        background: rgba(255, 45, 85, 0.12);
      }
      .events-view__day-item-media {
        position: relative;
        flex-shrink: 0;
        width: 44px;
        height: 44px;
      }
      .events-view__day-item-img {
        width: 44px;
        height: 44px;
        border-radius: 6px;
        object-fit: cover;
        background: rgba(255, 255, 255, 0.06);
      }
      .events-view__day-item-img--fallback {
        display: grid;
        place-items: center;
        font-size: 16px;
      }
      .events-view__day-item-live {
        position: absolute;
        bottom: 2px;
        left: 2px;
        padding: 1px 4px;
        border-radius: 3px;
        background: rgba(12, 14, 20, 0.85);
        font-size: 7px;
        font-weight: 800;
        color: var(--ev-accent);
        text-transform: uppercase;
      }
      .events-view__day-item-body {
        display: flex;
        flex-direction: column;
        gap: 2px;
        min-width: 0;
      }
      .events-view__day-item-name {
        font-size: 11px;
        font-weight: 700;
        line-height: 1.3;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      .events-view__day-item-meta {
        font-size: 10px;
        color: var(--ev-muted);
      }
      .events-view__highlight-desc {
        margin: 4px 0 0;
        font-size: 11px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.78);
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 8;
        -webkit-box-orient: vertical;
        word-break: break-word;
      }
      .events-view__columns {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        flex: 0 0 min(38%, 280px);
        min-height: 0;
        max-height: 38%;
      }
      /* Weekly: day columns + highlight sidebar — no calendar */
      .events-view--weekly {
        flex: 1;
        min-height: 0;
        height: 100%;
        display: grid;
        grid-template-rows: auto auto 1fr;
        grid-template-columns: 3fr 1fr;
        grid-template-areas:
          'header header'
          'status status'
          'columns highlight';
      }
      .events-view--weekly .events-view__header {
        grid-area: header;
      }
      .events-view--weekly .events-view__status {
        grid-area: status;
      }
      .events-view--weekly .events-view__dow-row,
      .events-view--weekly .events-view__calendar-pane {
        display: none;
      }
      .events-view--weekly .events-view__month-label {
        display: none;
      }
      .events-view--weekly .events-view__main {
        display: contents;
      }
      .events-view--weekly .events-view__highlight {
        grid-area: highlight;
        min-height: 0;
        height: 100%;
        align-self: stretch;
      }
      .events-view--weekly .events-view__columns {
        grid-area: columns;
        flex: unset;
        max-height: none;
        min-height: 0;
      }
      .events-view--calendar {
        display: flex;
        flex-direction: column;
        flex: 1 1 auto;
        min-height: 0;
        height: 100%;
        padding: 8px 16px 12px;
        gap: 0;
        overflow: hidden;
      }
      .events-view--calendar .events-view__list-shell {
        flex: 1 1 auto;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto auto minmax(0, 1fr);
        grid-template-columns: minmax(0, 1fr);
        gap: 6px;
        overflow: hidden;
      }
      .events-view--calendar .events-view__header,
      .events-view--calendar .events-view__status,
      .events-view--calendar .events-view__dow-row {
        min-height: 0;
      }
      .events-view--calendar .events-view__columns {
        display: none;
      }
      .events-view--calendar .events-view__main {
        display: grid;
        grid-template-columns: minmax(0, 3fr) minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        min-height: 0;
        overflow: hidden;
        gap: 12px;
        align-self: stretch;
      }
      .events-view--calendar .events-view__calendar-pane {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-width: 0;
        min-height: 0;
        overflow: hidden;
      }
      .events-view--calendar .events-view__calendar-grid {
        min-height: 0;
        overflow: hidden;
        align-content: stretch;
        grid-template-rows: repeat(6, minmax(0, 1fr));
      }
      .events-view--calendar .events-view__day {
        min-height: 0;
        height: auto;
        align-self: stretch;
      }
      .events-view--calendar .events-view__highlight {
        min-width: 0;
        min-height: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .events-view--calendar .events-view__day-panel {
        flex: 1;
        min-height: 0;
      }
      .events-view--calendar .events-view__highlight-empty {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .events-view__col {
        display: flex;
        flex-direction: column;
        min-height: 0;
        min-width: 0;
        background: var(--ev-surface);
        border: 1px solid var(--ev-border);
        border-radius: 10px;
        overflow: hidden;
      }
      .events-view__col.is-selected-col {
        border-color: rgba(255, 45, 85, 0.45);
      }
      .events-view__col-head {
        padding: 8px 10px;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.04em;
        border-bottom: 1px solid var(--ev-border);
        flex-shrink: 0;
        background: rgba(255, 255, 255, 0.03);
      }
      .events-view__col-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 8px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;

        min-height: 0;
        padding: 12px 20px 16px;
        gap: 12px;
        background: rgba(0, 0, 0, 0.18);
        color: #fff;
        overflow: hidden;
      }
      .gallery-view__list,
      .gallery-view__detail {
        display: flex;
        flex-direction: column;
        flex: 1;
        min-height: 0;
        gap: 12px;
      }
      .gallery-view__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        flex-shrink: 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--gv-border);
      }
      .gallery-view__title {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
      }
      .gallery-view__storage {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
        min-width: 180px;
      }
      .gallery-view__storage-label {
        font-size: 11px;
        color: var(--gv-muted);
        white-space: nowrap;
      }
      .gallery-view__storage-track {
        width: 160px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
      }
      .gallery-view__storage-fill {
        height: 100%;
        border-radius: inherit;
        background: rgba(255, 255, 255, 0.72);
        width: 0;
        transition: width 0.2s ease;
      }
      .gallery-view__status {
        margin: 0;
        font-size: 12px;
        flex-shrink: 0;
      }
      .gallery-view__status--loading {
        color: var(--gv-muted);
      }
      .gallery-view__status--error {
        color: #ffb4b4;
      }
      .gallery-view__sections {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding-right: 4px;
      }
      .gallery-view__section-title {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 700;
      }
      .gallery-view__grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 900px) {
        .gallery-view__grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .gallery-view__thumb {
        position: relative;
        padding: 0;
        border: 1px solid transparent;
        border-radius: 8px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.04);
        cursor: pointer;
        aspect-ratio: 16 / 10;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
      }
      .gallery-view__thumb:hover {
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35);
        transform: translateY(-2px);
      }
      .gallery-view__thumb-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .gallery-view__empty {
        margin: 24px 0;
        text-align: center;
        color: var(--gv-muted);
        font-size: 13px;
        line-height: 1.45;
      }
      .gallery-view__detail-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-shrink: 0;
      }
      .gallery-view__back {
        padding: 6px 0;
        border: none;
        background: none;
        color: rgba(255, 255, 255, 0.88);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .gallery-view__share-x {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border: 1px solid var(--gv-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.15s;
      }
      .gallery-view__share-x:hover {
        background: rgba(255, 255, 255, 0.14);
      }
      .gallery-view__detail-body {
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
        overflow: hidden;
      }
      .gallery-view__detail-img {
        flex: 1;
        min-height: 0;
        width: 100%;
        object-fit: contain;
        border-radius: 10px;
        background: rgba(0, 0, 0, 0.35);
      }
      .gallery-view__detail-meta {
        margin: 0;
        font-size: 11px;
        color: var(--gv-muted);
        flex-shrink: 0;
      }

      /* ===== Places View (settings overlay) ===== */
      .places-view {
        --pv-surface: rgba(8, 10, 16, 0.72);
        --pv-border: rgba(255, 255, 255, 0.08);
        --pv-accent: #ff2d55;
        --pv-muted: rgba(255, 255, 255, 0.55);
        display: flex;
        flex-direction: column;
        height: 100%;
        min-height: 0;
        padding: 12px 20px 16px;
        gap: 10px;
        background: rgba(0, 0, 0, 0.18);
        color: #fff;
        overflow: hidden;
      }
      .places-view__header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        flex-shrink: 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--pv-border);
      }
      .places-view__title {
        margin: 0;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: -0.01em;
      }
      .places-view__header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }
      .places-view__sort {
        padding: 6px 10px;
        border-radius: 8px;
        border: 1px solid var(--pv-border);
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.88);
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }
      .places-view__btn {
        padding: 7px 14px;
        border-radius: 8px;
        border: 1px solid var(--pv-border);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition: background 0.15s;
      }
      .places-view__btn--ghost {
        background: rgba(255, 255, 255, 0.06);
        color: rgba(255, 255, 255, 0.88);
      }
      .places-view__btn--ghost:hover {
        background: rgba(255, 255, 255, 0.12);
      }
      .places-view__subtabs {
        display: flex;
        gap: 4px;
        flex-shrink: 0;
      }
      .places-view__subtab {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid var(--pv-border);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.65);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: background 0.15s, color 0.15s, border-color 0.15s;
      }
      .places-view__subtab:hover {
        color: rgba(255, 255, 255, 0.88);
      }
      .places-view__subtab.is-active {
        background: rgba(255, 45, 85, 0.2);
        border-color: rgba(255, 45, 85, 0.45);
        color: #fff;
      }
      .places-view__toolbar {
        flex-shrink: 0;
      }
      .places-view__search {
        width: 100%;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid var(--pv-border);
        background: rgba(255, 255, 255, 0.06);
        color: #fff;
        font-size: 13px;
        outline: none;
      }
      .places-view__search::placeholder {
        color: rgba(255, 255, 255, 0.4);
      }
      .places-view__search:focus {
        border-color: rgba(255, 45, 85, 0.5);
      }
      .places-view__cat-bar {
        display: flex;
        gap: 6px;
        overflow-x: auto;
        flex-shrink: 0;
        padding-bottom: 4px;
        scrollbar-width: none;
      }
      .places-view__cat-bar::-webkit-scrollbar {
        display: none;
      }
      .places-view__cat-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        flex-shrink: 0;
        padding: 6px 12px 6px 8px;
        border-radius: 999px;
        border: 1px solid var(--pv-border);
        background: rgba(255, 255, 255, 0.04);
        color: rgba(255, 255, 255, 0.75);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
      }
      .places-view__cat-pill:hover {
        color: rgba(255, 255, 255, 0.92);
      }
      .places-view__cat-pill.is-active {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(255, 255, 255, 0.28);
        color: #fff;
      }
      .places-view__cat-swatch {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        flex-shrink: 0;
      }
      .places-view__status {
        margin: 0;
        font-size: 12px;
        flex-shrink: 0;
      }
      .places-view__status--loading {
        color: var(--pv-muted);
      }
      .places-view__status--error {
        color: #ffb4b4;
      }
      .places-view__results {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        position: relative;
      }
      .places-view__grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }
      @media (min-width: 900px) {
        .places-view__grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
          gap: 16px;
        }
      }
      @media (min-width: 1200px) {
        .places-view__grid {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
      .places-view__card {
        display: flex;
        flex-direction: column;
        border-radius: 12px;
        overflow: hidden;
        background: var(--pv-surface);
        border: 1px solid var(--pv-border);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
        transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
        cursor: default;
      }
      .places-view__card:hover {
        border-color: rgba(255, 255, 255, 0.22);
        box-shadow:
          0 14px 36px rgba(0, 0, 0, 0.38),
          0 0 0 1px rgba(255, 45, 85, 0.28);
        transform: translateY(-2px);
      }
      .places-view__card-media {
        position: relative;
        aspect-ratio: 3 / 2;
        background: rgba(255, 255, 255, 0.04);
      }
      .places-view__card-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .places-view__card-placeholder {
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02));
      }
      .places-view__card-badges {
        position: absolute;
        top: 8px;
        left: 8px;
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }
      .places-view__badge {
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 9px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .places-view__badge--featured {
        background: rgba(255, 193, 7, 0.92);
        color: #1a1200;
      }
      .places-view__badge--live {
        background: rgba(255, 45, 85, 0.92);
        color: #fff;
      }
      .places-view__card-count {
        position: absolute;
        top: 8px;
        right: 8px;
        padding: 4px 8px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.65);
        font-size: 10px;
        font-weight: 700;
      }
      .places-view__card-body {
        padding: 12px 12px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        flex: 1;
      }
      .places-view__card-title {
        margin: 0;
        font-size: 14px;
        font-weight: 700;
        line-height: 1.3;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .places-view__card-meta {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--pv-muted);
        min-height: 22px;
      }
      .places-view__card-creator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .places-view__card-avatar {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.12);
        overflow: hidden;
        flex-shrink: 0;
        display: grid;
        place-items: center;
        font-size: 8px;
        font-weight: 700;
      }
      .places-view__card-avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .places-view__card-owner {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .places-view__card-stat {
        flex-shrink: 0;
      }
      .places-view__card-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-top: auto;
        padding-top: 6px;
      }
      .places-view__card-location {
        font-size: 10px;
        color: var(--pv-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        min-width: 0;
      }
      .places-view__jump {
        flex-shrink: 0;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: var(--pv-accent);
        color: #fff;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: filter 0.15s;
      }
      .places-view__jump:hover {
        filter: brightness(1.08);
      }
      .places-view__empty,
      .places-view__load-more {
        margin: 12px 0 0;
        text-align: center;
        font-size: 12px;
        color: var(--pv-muted);
      }
      .places-view__sentinel {
        height: 1px;
      }

      /* Emote wheel — DCL Explorer-style radial menu */
      .emote-wheel-overlay {
        position: fixed;
        inset: 0;
        z-index: 200;
        display: grid;
        place-items: center;
        background: rgba(0, 0, 0, 0.62);
        cursor: default;
        opacity: 0;
        pointer-events: auto;
        transition: opacity 0.18s ease;
      }
      .emote-wheel-overlay[hidden] {
        display: none !important;
      }
      .emote-wheel-overlay.is-open {
        opacity: 1;
      }
      .emote-wheel__svg {
        width: min(420px, 82vmin);
        height: min(420px, 82vmin);
        filter: drop-shadow(0 6px 36px rgba(0, 0, 0, 0.55));
        transform: scale(0.82);
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1);
        pointer-events: none;
      }
      .emote-wheel-overlay.is-open .emote-wheel__svg {
        transform: scale(1);
      }
      .emote-wheel__glow {
        fill: none;
        stroke: rgba(140, 100, 255, 0.12);
        stroke-width: 2;
      }
      .emote-wheel__slot {
        pointer-events: auto;
        cursor: pointer;
      }
      .emote-wheel__wedge {
        fill: rgba(120, 120, 128, 0.88);
        stroke: rgba(255, 255, 255, 0.14);
        stroke-width: 0.8;
        transition: fill 0.12s ease;
      }
      .emote-wheel__wedge.is-hovered,
      .emote-wheel__slot:hover .emote-wheel__wedge {
        fill: rgba(168, 168, 176, 0.95);
      }
      .emote-wheel__slot:hover .emote-wheel__key {
        fill: rgba(255, 255, 255, 0.72);
      }
      .emote-wheel__key {
        fill: rgba(255, 255, 255, 0.38);
        font-family: system-ui, sans-serif;
        font-size: 9px;
        font-weight: 700;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
        transition: fill 0.12s ease;
      }
      .emote-wheel__name {
        fill: rgba(255, 255, 255, 0.9);
        font-family: system-ui, sans-serif;
        font-size: 10px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }
      .emote-wheel__center {
        fill: rgba(96, 96, 104, 0.94);
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 1.5;
      }
      .emote-wheel__center-title {
        fill: rgba(255, 255, 255, 0.92);
        font-family: system-ui, sans-serif;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }
      .emote-wheel__center-sub {
        fill: rgba(255, 255, 255, 0.42);
        font-family: system-ui, sans-serif;
        font-size: 9px;
        font-weight: 600;
        text-anchor: middle;
        dominant-baseline: central;
        pointer-events: none;
      }
      .emote-wheel__hint {
        position: absolute;
        left: 50%;
        bottom: max(24px, 5vh);
        transform: translateX(-50%);
        padding: 8px 16px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.5);
        color: rgba(255, 255, 255, 0.6);
        font-size: 12px;
        white-space: nowrap;
        pointer-events: none;
      }
      .emote-wheel__hint kbd {
        display: inline-block;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(255, 255, 255, 0.85);
        font-family: system-ui, sans-serif;
        font-size: 11px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="hud">
      <div class="title">DCL Three.js Client</div>
      <div id="hud-status">Loading…</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
